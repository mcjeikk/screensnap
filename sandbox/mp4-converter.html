<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MP4 Converter (Sandboxed)</title>
  <!-- Local UMD builds — sandbox CSP only allows 'self' for scripts -->
  <script src="vendor/ffmpeg.js"></script>
  <script src="vendor/ffmpeg-util.js"></script>
</head>
<body>
  <script>
    /**
     * Sandboxed MP4 converter using ffmpeg.wasm.
     * UMD globals: FFmpegWASM.FFmpeg, FFmpegUtil.toBlobURL/fetchFile
     * Sandbox allows unsafe-eval + blob: URLs (needed for ffmpeg Workers).
     * The heavy core (~32MB .wasm) loads on-demand from CDN via fetch+blobURL.
     */

    let ffmpegLoaded = false;
    let ffmpeg = null;

    async function loadFFmpeg(sendProgress) {
      const { FFmpeg } = FFmpegWASM;
      const { toBlobURL } = FFmpegUtil;

      ffmpeg = new FFmpeg();

      ffmpeg.on('progress', ({ progress }) => {
        sendProgress('converting', progress);
      });

      sendProgress('loading', 0.3);

      // Core WASM loaded via fetch → blobURL (not a script, bypasses CSP)
      const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
      await ffmpeg.load({
        coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
        wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
      });

      ffmpegLoaded = true;
    }

    async function convertToMP4(webmData, source) {
      const sendProgress = (stage, pct) => {
        source.postMessage({ type: 'mp4-progress', stage, progress: pct }, '*');
      };

      try {
        if (!ffmpegLoaded) {
          sendProgress('loading', 0);
          await loadFFmpeg(sendProgress);
          sendProgress('loading', 1);
        }

        sendProgress('converting', 0);

        const inputData = new Uint8Array(webmData);
        await ffmpeg.writeFile('input.webm', inputData);
        await ffmpeg.exec([
          '-i', 'input.webm',
          '-c:v', 'libx264',
          '-preset', 'fast',
          '-crf', '23',
          '-c:a', 'aac',
          '-b:a', '128k',
          'output.mp4'
        ]);

        const data = await ffmpeg.readFile('output.mp4');

        await ffmpeg.deleteFile('input.webm');
        await ffmpeg.deleteFile('output.mp4');

        source.postMessage(
          { type: 'mp4-result', success: true, data: data.buffer },
          '*',
          [data.buffer]
        );

      } catch (err) {
        source.postMessage({ type: 'mp4-result', success: false, error: err.message }, '*');
      }
    }

    window.addEventListener('message', (event) => {
      if (event.data?.type === 'convert-to-mp4') {
        convertToMP4(event.data.webmData, event.source);
      }
    });

    // Signal ready to parent
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'mp4-converter-ready' }, '*');
    }
  </script>
</body>
</html>
